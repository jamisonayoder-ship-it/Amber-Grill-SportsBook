function hashNum(s) { let h = 2166136261; for (let i = 0; i < s.length; i++) { h ^= s.charCodeAt(i); h = Math.imul(h, 16777619); } return h >>> 0; }
const ratingJitter = (name) => (hashNum(name) % 61) - 30;        // ±30 wobble
const seedRating = (name) => 1230 + (hashNum(name + "x") % 400); // fallback when no seed

function buildTeams() {
  const out = {};
  GROUPS.forEach((grp) => grp.teams.forEach((name, i) => {
    out[name] = { name, group: grp.g, conf: grp.conf, seed: i + 1, rating: grp.base - i * 16 + ratingJitter(name) };
  }));
  return out;
}

const winProb = (rA, rB) => 1 / (1 + Math.pow(10, (rB - rA) / 200));
function probToAmerican(q) {
  q = Math.min(Math.max(q, 0.02), 0.98);
  return q >= 0.5 ? -Math.round((100 * q) / (1 - q)) : Math.round((100 * (1 - q)) / q);
}
const compress = (p, k = 0.8) => 0.5 + (p - 0.5) * k;
function threeWay(pA2, ratingDiff) {
  const pc = compress(pA2);
  const drawP = 0.16 + 0.14 * Math.exp(-Math.abs(ratingDiff) / 250);
  const pA = (1 - drawP) * pc, pB = (1 - drawP) * (1 - pc), h = 1.22;
  return [probToAmerican(pA * h), probToAmerican(drawP * h), probToAmerican(pB * h)];
}
function liveThreeWay(g, s) {
  const goalDiff = s.a - s.b;
  const eff = (g.ratingA - g.ratingB) * (1 - 0.5 * s.p) + goalDiff * (150 + 250 * s.p);
  const pA2 = compress(winProb(eff, 0));
  const drawP = goalDiff === 0
    ? Math.min(0.72, 0.16 + 0.34 * s.p)
    : (0.14 + 0.16 * Math.exp(-Math.abs(eff) / 250)) * (1 - 0.75 * s.p);
  const pA = (1 - drawP) * pA2, pB = (1 - drawP) * (1 - pA2), h = 1.22;
  return [probToAmerican(pA * h), probToAmerican(drawP * h), probToAmerican(pB * h)];
}
function futuresAmerican(q) { return q >= 0.5 ? -Math.round((100 * q) / (1 - q)) : Math.min(6000, Math.round((100 * (1 - q)) / q)); }
const toDecimal = (a) => (a > 0 ? a / 100 + 1 : 100 / -a + 1);
function toAmerican(dec) { if (dec <= 1.0001) return -100000; return dec >= 2 ? Math.round((dec - 1) * 100) : Math.round(-100 / (dec - 1)); }
const fmt = (a) => (a > 0 ? `+${a}` : `${a}`);
const half = (x) => Math.round(x * 2) / 2;

// pre-game 3-way + spread + total (centered on the competition's avg goals) + props
function makeGame({ key, group, conf, A, B, rA, rB, round, time, avg = 8 }) {
  const [mlA, mlD, mlB] = threeWay(winProb(rA, rB), rA - rB);
  const spread = half((rA - rB) / 95);
  const total = half(Math.min(avg + 3, Math.max(avg - 3, avg + (rA + rB - 3000) / 300)));
  return {
    key, group, conf: conf || group, round: round || "Rd 1", time: time || "",
    A, B, ratingA: rA, ratingB: rB,
    markets: {
      spread: { aLine: spread <= 0 ? spread : -spread, bLine: spread <= 0 ? -spread : spread, aOdds: -145, bOdds: -145 },
      ml: { aOdds: mlA, drawOdds: mlD, bOdds: mlB },
      total: { line: total, overOdds: -145, underOdds: -145 },
    },
    props: buildProps(),
  };
}

// Team Keeper Wars board (hardcoded nations, avg 8 goals)
function buildTkwBoard(T) {
  const slots = ["Sat · 7:00", "Sat · 7:45", "Sat · 8:30", "Sun · 6:00", "Sun · 7:30"];
  const games = [];
  GROUPS.forEach((grp) => {
    [[0, 9], [1, 6], [2, 8], [3, 5], [4, 7]].forEach(([a, b], k) => {
      const A = T[grp.teams[a]], B = T[grp.teams[b]];
      games.push(makeGame({ key: grp.g + k, group: grp.g, conf: grp.conf, A: A.name, B: B.name, rA: A.rating, rB: B.rating, time: slots[k], avg: 8 }));
    });
  });
  return games;
}

function buildFuturesFrom(arr, compName) {
  if (!arr.length) return [];
  const strength = arr.map((t) => Math.pow(10, t.rating / 640));
  const sum = strength.reduce((a, b) => a + b, 0);
  return arr.map((t, i) => ({ name: t.name, group: t.group, conf: t.conf || compName, odds: futuresAmerican(Math.min(0.92, (strength[i] / sum) * 2.3)) }))
    .sort((a, b) => toDecimal(a.odds) - toDecimal(b.odds));
}

function parseCSV(text) {
  const rows = []; let row = [], cell = "", q = false;
  for (let i = 0; i < text.length; i++) {
    const ch = text[i];
    if (q) { if (ch === '"' && text[i + 1] === '"') { cell += '"'; i++; } else if (ch === '"') q = false; else cell += ch; }
    else if (ch === '"') q = true;
    else if (ch === ",") { row.push(cell); cell = ""; }
    else if (ch === "\n") { row.push(cell); rows.push(row); row = []; cell = ""; }
    else if (ch !== "\r") cell += ch;
  }
  if (cell.length || row.length) { row.push(cell); rows.push(row); }
  return rows;
}

/* Score grid layout: a "Round" header locates data rows; each game is a pair of
   adjacent "Score" columns flanked by team names — [Home | Score | Score | Away].
   Returns every fixture, marking played=true when both scores are numbers. */
function parseGroupFixtures(grid) {
  const at = (r, c) => (grid[r] && grid[r][c] != null) ? String(grid[r][c]).trim() : "";
  let headerRow = -1, roundCol = -1;
  for (let r = 0; r < grid.length && headerRow < 0; r++)
    for (let c = 0; c < (grid[r] || []).length; c++)
      if (at(r, c).toLowerCase() === "round") { headerRow = r; roundCol = c; break; }
  if (headerRow < 0) return [];
  const scoreCols = [];
  for (let c = 0; c < (grid[headerRow] || []).length; c++)
    if (at(headerRow, c).toLowerCase() === "score") scoreCols.push(c);
  const pairs = [];
  for (let i = 0; i + 1 < scoreCols.length; i += 2) pairs.push([scoreCols[i], scoreCols[i + 1]]);
  const out = [];
  for (let r = headerRow + 1; r < grid.length; r++) {
    const rd = at(r, roundCol);
    if (!/^\d+$/.test(rd)) continue;
    pairs.forEach(([sa, sb]) => {
      const home = at(r, sa - 1), away = at(r, sb + 1), hs = at(r, sa), as = at(r, sb);
      if (!home || !away) return;
      const played = /^\d+$/.test(hs) && /^\d+$/.test(as);
      out.push({ round: +rd, home, away, hs: played ? +hs : null, as: played ? +as : null, played });
    });
  }
  return out;
}


function legFromMarket(game, market, side) {
  const m = game.markets;
  if (market === "ml") {
    if (side === "draw") return { id: `${game.key}-ml-draw`, gk: game.key, market, label: "Draw", sub: "Match result", odds: m.ml.drawOdds, match: `${game.A} v ${game.B}` };
    const team = side === "a" ? game.A : game.B;
    return { id: `${game.key}-ml-${side}`, gk: game.key, market, label: team, sub: "Match result", odds: side === "a" ? m.ml.aOdds : m.ml.bOdds, match: `${game.A} v ${game.B}` };
  }
  if (market === "spread") {
    const team = side === "a" ? game.A : game.B;
    const line = side === "a" ? m.spread.aLine : m.spread.bLine;
    return { id: `${game.key}-spread-${side}`, gk: game.key, market, label: `${team} ${line > 0 ? "+" : ""}${line}`, sub: "Spread", odds: side === "a" ? m.spread.aOdds : m.spread.bOdds, match: `${game.A} v ${game.B}` };
  }
  const over = side === "over";
  return { id: `${game.key}-total-${side}`, gk: game.key, market, label: `${over ? "Over" : "Under"} ${m.total.line}`, sub: "Total goals", odds: over ? m.total.overOdds : m.total.underOdds, match: `${game.A} v ${game.B}` };
}
const legFromProp = (game, prop, oi) => ({ id: `${game.key}-prop-${prop.key}-${oi}`, gk: game.key, market: `prop-${prop.key}`, label: `${prop.title.replace(/\s*\(.*\)/, "")} — ${prop.opts[oi][0]}`, sub: "Prop", odds: prop.opts[oi][1], match: `${game.A} v ${game.B}` });
const legFromFuture = (f, compName) => ({ id: `fut-${norm(compName)}-${norm(f.name)}`, gk: `fut-${norm(compName)}-${norm(f.name)}`, market: "futures", label: f.name, sub: `To win ${compName}`, odds: f.odds, match: "Outright winner" });

function GameCard({ game, selected, toggle, hideToggle = false }) {
  const [showProps, setShowProps] = useState(false);
  const isSel = (id) => selected.has(id);
  const m = game.markets;
  const SpTotRow = ({ team, side, isOver }) => (
    <div style={{ display: "grid", gridTemplateColumns: "1fr 84px 84px", gap: 6, alignItems: "center" }}>
      <div style={{ display: "flex", alignItems: "center", gap: 8, minWidth: 0 }}>

        <span style={{ fontSize: 13.5, fontWeight: 600, color: C.text, overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" }}>{team}</span>
      </div>
      <OddsBtn top={`${(side === "a" ? m.spread.aLine : m.spread.bLine) > 0 ? "+" : ""}${side === "a" ? m.spread.aLine : m.spread.bLine}`} odds={side === "a" ? m.spread.aOdds : m.spread.bOdds} active={isSel(`${game.key}-spread-${side}`)} onClick={() => toggle(legFromMarket(game, "spread", side))} />

const ratingFromSeed = (seed, seedMax, name) => 1655 - (seed - 1) * (300 / Math.max(1, seedMax - 1)) + ratingJitter(name);

// Full pre-game board for a competition, pairing teams within each group.
function buildCompBoard(groups, comp, avg, seedMax) {
  const games = [];
  groups.forEach((grp) => {
    const T = grp.teams.map(([name, seed]) => ({ name, seed, rating: ratingFromSeed(seed, seedMax, name) }));
    [[0, 9], [1, 6], [2, 8], [3, 5], [4, 7]].forEach(([a, b], k) => {
      const A = T[a], B = T[b];
      games.push(makeGame({ key: `${comp}-${grp.g}-${k}`, group: grp.g, conf: grp.conf, A: A.name, B: B.name, rA: A.rating, rB: B.rating, round: "Rd 1", avg }));
    });
  });
  return games;
}

function rosterArray(groups, seedMax) {
  const arr = [];
  groups.forEach((grp) => grp.teams.forEach(([name, seed]) => arr.push({ name, group: grp.g, conf: grp.conf, rating: ratingFromSeed(seed, seedMax, name) })));
  return arr;
}

// Poll a competition's score feeds and map live results onto its board by team name.
function useLiveScores(feeds, baseBoard) {
  const [scores, setScores] = useState({});
  const [feed, setFeed] = useState("idle");
  useEffect(() => {
    let stop = false;
    const lookup = {};
    baseBoard.forEach((g) => {
      lookup[norm(g.A) + "|" + norm(g.B)] = { key: g.key, aIsHome: true };
      lookup[norm(g.B) + "|" + norm(g.A)] = { key: g.key, aIsHome: false };
    });
    async function pull() {
      let anyOk = false;
      const next = {};
      await Promise.all(feeds.map(async (url) => {
        try {
          const res = await fetch(url, { cache: "no-store" });
          if (!res.ok) return;
          const txt = await res.text();
          if (txt.trim().startsWith("<!")) return;
          anyOk = true;
          parseGroupFixtures(parseCSV(txt)).forEach((m) => {
            if (!m.played) return;
            const hit = lookup[norm(m.home) + "|" + norm(m.away)];
            if (!hit) return;
            next[hit.key] = hit.aIsHome ? { a: m.hs, b: m.as, p: 1 } : { a: m.as, b: m.hs, p: 1 };
          });
        } catch (e) { /* keep other feeds alive */ }
      }));
      if (stop) return;
      setScores(next); setFeed(anyOk ? "live" : "manual");
    }
    pull();
    const id = setInterval(pull, POLL_MS);
    return () => { stop = true; clearInterval(id); };
  }, [feeds, baseBoard]);
  return { scores, feed };
}

function overlayLive(board, scores) {
  return board.map((g) => {
    const s = scores[g.key];
    if (!s) return g;
    const [mlA, mlD, mlB] = liveThreeWay(g, s);
    return { ...g, live: true, scoreA: s.a, scoreB: s.b, markets: { ...g.markets, ml: { aOdds: mlA, drawOdds: mlD, bOdds: mlB } } };
  });
}

async function submitBet(payload) {
  if (!BET_ENDPOINT) return;
  try {
    await fetch(BET_ENDPOINT, { method: "POST", mode: "no-cors", headers: { "Content-Type": "text/plain;charset=utf-8" }, body: JSON.stringify(payload) });
  } catch (e) { /* fire and forget */ }
}

    const opts = { passive: true, once: true };
    window.addEventListener("wheel", ignite, opts);
    window.addEventListener("touchmove", ignite, opts);
    window.addEventListener("scroll", ignite, opts);
    window.addEventListener("keydown", ignite, { once: true });

  const feedColor = active.feed === "live" ? C.green : active.feed === "manual" ? C.red : C.sub;

  const CompPill = ({ id }) => (
    <button onClick={() => pickComp(id)} style={{ flex: 1, padding: "9px 6px", borderRadius: 10, cursor: "pointer", border: `1px solid ${comp === id ? C.green : C.line}`, background: comp === id ? "rgba(63,220,107,0.14)" : C.chip, color: comp === id ? C.green : C.sub, fontWeight: 900, fontSize: 12.5, whiteSpace: "nowrap" }}>{comps[id].short}</button>
  );
  const SubTab = ({ id, children }) => (
    <button onClick={() => { setView(id); setShowAllFut(false); }} style={{ flex: 1, padding: "9px 6px", background: "none", border: "none", cursor: "pointer", color: view === id ? C.text : C.sub, fontWeight: 800, fontSize: 13, borderBottom: `2px solid ${view === id ? C.green : "transparent"}` }}>{children}</button>
  );

  return (
    <div style={{ minHeight: "100vh", background: C.bg, color: C.text, fontFamily: "system-ui, -apple-system, Segoe UI, Roboto, sans-serif", paddingBottom: 92 }}>
      {!booted && <Intro onFinish={() => setBooted(true)} />}
      {promo && (
        <div style={{ position: "fixed", inset: 0, zIndex: 100, display: "flex", alignItems: "center", justifyContent: "center", padding: 20, background: "rgba(0,0,0,.72)" }}>
          <div style={{ maxWidth: 360, width: "100%", background: C.panel, border: `1px solid ${C.green}`, borderRadius: 18, overflow: "hidden", boxShadow: "0 20px 60px rgba(0,0,0,.6)" }}>
            <div style={{ background: "linear-gradient(135deg,#1f9d4d,#3fdc6b)", padding: "22px 20px", textAlign: "center" }}>
              <div style={{ fontSize: 11, fontWeight: 900, letterSpacing: 1.5, color: "#062812" }}>NEW MEMBER PROMO</div>
              <div style={{ fontSize: 30, fontWeight: 900, color: "#062812", lineHeight: 1.05, marginTop: 6 }}>AG$10 FREE BET</div>
              <div style={{ fontSize: 13, fontWeight: 800, color: "#0a3d1e", marginTop: 2 }}>when you deposit AG$5</div>
            </div>
            <div style={{ padding: "18px 20px 20px" }}>
              <div style={{ fontSize: 12.5, color: C.text, textAlign: "center", marginBottom: 14, lineHeight: 1.4 }}>
                Drop a fiver in the beer fund and we'll spot you AG$10 to play with. Welcome to the book. 🍺
              </div>
              <button onClick={() => setPromo(false)} style={{ width: "100%", height: 48, borderRadius: 12, border: "none", cursor: "pointer", background: C.green, color: "#062812", fontSize: 15, fontWeight: 900 }}>Claim &amp; Enter</button>
              <div style={{ fontSize: 9.5, color: C.sub, textAlign: "center", marginTop: 10 }}>Amber Grill Cash only · 1× rollover · see Bulldog or Yoder to deposit</div>
            </div>
          </div>
        </div>
      )}

      <div style={{ background: "repeating-linear-gradient(45deg,#1a0f10,#1a0f10 10px,#241012 10px,#241012 20px)", borderBottom: `1px solid ${C.red}`, padding: "6px 12px", display: "flex", alignItems: "center", justifyContent: "center", gap: 8, flexWrap: "wrap" }}>
        <span style={{ fontSize: 10.5, fontWeight: 900, letterSpacing: 1.2, color: C.red }}>⚠ CONFIDENTIAL</span>
        <span style={{ fontSize: 10.5, fontWeight: 700, letterSpacing: 0.8, color: "#e0a3a5" }}>STAFF USE ONLY · AMBER GRILL SPORTSBOOK</span>
      </div>

      <header style={{ padding: "12px 12px 10px", borderBottom: `1px solid ${C.line}`, background: C.panel, display: "flex", alignItems: "center", gap: 10 }}>
        <div style={{ width: 34, height: 34, borderRadius: 9, background: C.green, display: "grid", placeItems: "center", fontWeight: 900, color: "#062812", fontSize: 15 }}>👑</div>
        <div style={{ lineHeight: 1.1, flex: 1 }}>
          <div style={{ fontSize: 16, fontWeight: 900, letterSpacing: -0.3 }}>AMBER GRILL SPORTSBOOK</div>
          <div style={{ fontSize: 10.5, color: C.sub, fontWeight: 600 }}>{active.name} · odds board</div>
        </div>
        <span style={{ display: "inline-flex", alignItems: "center", gap: 5, fontSize: 10, fontWeight: 800, color: feedColor }}>
          <span style={{ width: 7, height: 7, borderRadius: 99, background: feedColor }} />{feedLabel}
        </span>
      </header>

      {/* competition selector */}
      <div style={{ display: "flex", gap: 6, padding: "10px 12px 6px", maxWidth: 640, margin: "0 auto" }}>
        <CompPill id="tkw" /><CompPill id="doug" /><CompPill id="stan" />
      </div>
      {/* game lines / winner */}
      <div style={{ display: "flex", borderBottom: `1px solid ${C.line}`, maxWidth: 640, margin: "0 auto", padding: "0 12px" }}>
        <SubTab id="games">Game Lines</SubTab>
        <SubTab id="futures">Winner</SubTab>
      </div>

      {view === "games" && (
        <>
          <div style={{ display: "flex", gap: 6, overflowX: "auto", padding: "10px 12px", maxWidth: 640, margin: "0 auto" }}>
            {["ALL", ...activeGroups].map((g) => (
              <button key={g} onClick={() => setFilter(g)} style={{ flex: "0 0 auto", padding: "6px 12px", borderRadius: 99, fontSize: 12, fontWeight: 800, cursor: "pointer", border: `1px solid ${filter === g ? C.green : C.line}`, background: filter === g ? "rgba(63,220,107,0.14)" : C.chip, color: filter === g ? C.green : C.sub }}>
                {g === "ALL" ? "All Games" : `Group ${g}`}
              </button>
            ))}
          </div>
          <main style={{ padding: "0 12px", maxWidth: 640, margin: "0 auto" }}>
            {activeGames.length
              ? activeGames.map((g) => <GameCard key={g.key} game={g} selected={selected} toggle={toggle} />)
              : <div style={{ padding: "28px 14px", textAlign: "center", color: C.sub, fontSize: 13, background: C.panel, border: `1px solid ${C.line}`, borderRadius: 12, lineHeight: 1.5 }}>
                  {active.feed === "manual" ? `Couldn't reach the ${active.name} sheets from here — games appear once the published feeds are reachable.` : `Loading ${active.name} fixtures…`}
                </div>}
          </main>
        </>
      )}

      {view === "futures" && (
        <main style={{ padding: "12px 12px 0", maxWidth: 640, margin: "0 auto" }}>
          <div style={{ marginBottom: 10 }}>
            <div style={{ fontSize: 15, fontWeight: 900 }}>Win {active.name} 🏆</div>
            <div style={{ fontSize: 11.5, color: C.sub, fontWeight: 600 }}>Outright winner · odds to lift the cup</div>
          </div>
          {futAll.length ? futList.map((f, i) => {
            const id = `fut-${norm(active.name)}-${norm(f.name)}`, on = selected.has(id);
            return (
              <div key={f.name} style={{ display: "flex", alignItems: "center", gap: 10, background: C.panel, border: `1px solid ${on ? C.green : C.line}`, borderRadius: 10, padding: "9px 12px", marginBottom: 8 }}>
                <span style={{ fontSize: 12, fontWeight: 800, color: C.sub, width: 20 }}>{i + 1}</span>
                <span style={{ fontSize: 10, fontWeight: 800, color: C.sub, background: C.panel2, borderRadius: 5, padding: "3px 5px" }}>{abbr(f.name)}</span>
                <div style={{ flex: 1, minWidth: 0 }}>
                  <div style={{ fontSize: 13.5, fontWeight: 700, overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" }}>{f.name}</div>
                  <div style={{ fontSize: 10.5, color: C.sub, fontWeight: 600 }}>Grp {f.group} · {f.conf}</div>
                </div>
                <button onClick={() => toggle(legFromFuture(f, active.name))} style={{ minWidth: 84, padding: "9px 10px", borderRadius: 8, cursor: "pointer", border: `1px solid ${on ? C.green : C.line}`, background: on ? "rgba(63,220,107,0.12)" : C.chip, color: on ? C.green : C.text, fontWeight: 800, fontSize: 14 }}>{fmt(f.odds)}</button>
              </div>
            );
          }) : (
            <div style={{ padding: "28px 14px", textAlign: "center", color: C.sub, fontSize: 13, background: C.panel, border: `1px solid ${C.line}`, borderRadius: 12, lineHeight: 1.5 }}>
              {active.feed === "manual" ? `Couldn't reach the ${active.name} teams sheet from here.` : `Loading ${active.name} field…`}
            </div>
          )}
          {futAll.length > 20 && !showAllFut && <button onClick={() => setShowAllFut(true)} style={{ width: "100%", padding: "12px", background: C.chip, border: `1px solid ${C.line}`, borderRadius: 10, color: C.green, fontWeight: 800, fontSize: 13, cursor: "pointer", marginBottom: 12 }}>Show all {futAll.length} teams</button>}
        </main>
      )}

      {legs.length > 0 && !open && (
        <button onClick={() => setOpen(true)} style={{ position: "fixed", left: 12, right: 12, bottom: 12, height: 56, borderRadius: 14, border: "none", cursor: "pointer", background: C.green, color: "#062812", display: "flex", alignItems: "center", justifyContent: "space-between", padding: "0 18px", boxShadow: "0 8px 30px rgba(0,0,0,.5)", maxWidth: 616, margin: "0 auto" }}>
          <span style={{ fontWeight: 900, fontSize: 14 }}>{legs.length === 1 ? "Single" : `${legs.length}-Leg Parlay`} · {fmt(combinedAmerican)}</span>
          <span style={{ fontWeight: 900, fontSize: 14 }}>View Slip ▲</span>
        </button>
      )}

      {open && (
        <div style={{ position: "fixed", inset: 0, zIndex: 50, display: "flex", flexDirection: "column", justifyContent: "flex-end" }}>
          <div onClick={() => setOpen(false)} style={{ position: "absolute", inset: 0, background: "rgba(0,0,0,.55)" }} />
          <div style={{ position: "relative", background: C.panel, borderTop: `2px solid ${C.green}`, borderRadius: "18px 18px 0 0", maxHeight: "86vh", display: "flex", flexDirection: "column", maxWidth: 640, margin: "0 auto", width: "100%" }}>
            <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", padding: "14px 16px 10px" }}>
              <div style={{ fontSize: 15, fontWeight: 900 }}>Bet Slip {legs.length > 1 ? `· ${legs.length}-Leg Parlay` : ""}</div>
              <div style={{ display: "flex", gap: 12 }}>
                <button onClick={clearAll} style={{ background: "none", border: "none", color: C.sub, fontWeight: 700, fontSize: 12.5, cursor: "pointer" }}>Clear</button>
                <button onClick={() => setOpen(false)} style={{ background: "none", border: "none", color: C.sub, fontWeight: 700, fontSize: 12.5, cursor: "pointer" }}>Close ▼</button>
              </div>
            </div>
            <div style={{ overflowY: "auto", padding: "0 16px", flex: 1 }}>
              {legs.map((l) => (
                <div key={l.id} style={{ display: "flex", alignItems: "center", gap: 10, padding: "10px 0", borderBottom: `1px solid ${C.line}` }}>
                  <div style={{ flex: 1, minWidth: 0 }}>
                    <div style={{ fontSize: 13.5, fontWeight: 800 }}>{l.label}</div>
                    <div style={{ fontSize: 11, color: C.sub, fontWeight: 600 }}>{l.sub} · {l.match}</div>
                  </div>
                  <div style={{ fontWeight: 900, color: C.green, fontSize: 14 }}>{fmt(l.odds)}</div>
                  <button onClick={() => removeLeg(l.id)} style={{ background: "none", border: "none", color: C.sub, fontSize: 18, cursor: "pointer", lineHeight: 1 }}>×</button>
                </div>
              ))}
              <div style={{ padding: "14px 0 6px" }}>
                <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", gap: 12, marginBottom: 10 }}>
                  <span style={{ fontSize: 13, fontWeight: 700, color: C.sub }}>Bettor name</span>
                  <input value={bettor} onChange={(e) => { setPlaced(null); setBettor(e.target.value); }} placeholder="Required — who's this for?" style={{ flex: 1, maxWidth: 200, background: C.chip, border: `1px solid ${bettor.trim() ? C.line : C.red}`, borderRadius: 10, color: C.text, fontSize: 13.5, fontWeight: 700, padding: "7px 10px", outline: "none" }} />
                </div>
                <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", gap: 12, marginBottom: 12 }}>
                  <span style={{ fontSize: 13, fontWeight: 700, color: C.sub }}>Wager · Amber Grill Cash</span>
                  <div style={{ display: "flex", alignItems: "center", background: C.chip, border: `1px solid ${C.line}`, borderRadius: 10, padding: "6px 10px" }}>
                    <span style={{ color: C.sub, fontWeight: 800, marginRight: 4 }}>AG$</span>
                    <input type="number" min="0" value={stake} onChange={(e) => { setPlaced(null); setStake(Math.max(0, Number(e.target.value) || 0)); }} style={{ width: 70, background: "none", border: "none", color: C.text, fontSize: 16, fontWeight: 800, outline: "none", textAlign: "right" }} />
                  </div>
                </div>
                {[[`${legs.length > 1 ? "Parlay" : "Bet"} odds`, fmt(combinedAmerican)], ["To win", money(profit)], ["Gross payout", money(payout)]].map(([k, v]) => (
                  <div key={k} style={{ display: "flex", justifyContent: "space-between", fontSize: 13, padding: "3px 0", color: C.sub }}><span>{k}</span><span style={{ color: C.text, fontWeight: 700 }}>{v}</span></div>
                ))}
                <div style={{ display: "flex", justifyContent: "space-between", fontSize: 13, padding: "3px 0", color: C.gold }}><span>Admin fee — 5% rake</span><span style={{ fontWeight: 700 }}>−{money(rake)}</span></div>
                <div style={{ fontSize: 10.5, color: C.sub, fontStyle: "italic", marginTop: 2, marginBottom: 8 }}>Admin fees go toward beer purchases for Bulldog &amp; Yoder. 🍺</div>
                <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", padding: "8px 0", borderTop: `1px solid ${C.line}` }}>
                  <span style={{ fontSize: 14, fontWeight: 900 }}>Net payout</span>
                  <span style={{ fontSize: 18, fontWeight: 900, color: C.green }}>{money(net)}</span>
                </div>
              </div>
            </div>
            <div style={{ padding: "10px 16px 16px" }}>
              {placed ? (
                <div style={{ textAlign: "center", background: "rgba(63,220,107,0.12)", border: `1px solid ${C.green}`, borderRadius: 12, padding: "12px", fontSize: 13, fontWeight: 700, color: C.green }}>Ticket {placed} in. Good luck out there. 🍺</div>
              ) : (
                <button onPointerDown={startHold} onPointerUp={cancelHold} onPointerLeave={cancelHold} onPointerCancel={cancelHold} disabled={!canPlace} style={{ position: "relative", overflow: "hidden", width: "100%", height: 52, borderRadius: 14, border: "none", cursor: canPlace ? "pointer" : "not-allowed", background: canPlace ? C.green : C.line, color: canPlace ? "#062812" : C.sub, fontSize: 15, fontWeight: 900, touchAction: "none", userSelect: "none", WebkitUserSelect: "none" }}>
                  <span style={{ position: "absolute", left: 0, top: 0, bottom: 0, width: `${holdPct}%`, background: "rgba(6,40,18,0.30)", transition: holdPct === 0 ? "width .18s ease" : "none", pointerEvents: "none" }} />
                  <span style={{ position: "relative" }}>
                    {!legs.length ? "Add a pick to bet"
                      : !bettor.trim() ? "Enter a bettor name"
                      : holdPct > 0 ? "Keep holding…"
                      : `Hold to place ${legs.length > 1 ? "parlay" : "bet"} · ${money(stake)}`}
                  </span>
                </button>
              )}
              <div style={{ textAlign: "center", fontSize: 10, color: C.sub, marginTop: 8 }}>Amber Grill Sportsbook · keep it in the group chat 🤫</div>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}
</script>

<script>
(function () {
  function fail(msg) {
    document.getElementById('root').innerHTML =
      '<pre style="color:#ff9a9a;white-space:pre-wrap;padding:18px;font:13px/1.5 ui-monospace,Menlo,monospace;">' +
      String(msg).replace(/&/g,'&amp;').replace(/</g,'&lt;') + '</pre>';
  }
  try {
    if (!window.React || !window.ReactDOM)
      return fail('React did not load. If you use an ad/script blocker, allow cdn.jsdelivr.net and reload.');
    if (!window.Babel)
      return fail('The compiler (Babel) did not load. Allow cdn.jsdelivr.net and reload.');
    var src = document.getElementById('appsrc').textContent;
    var out = Babel.transform(src, { presets: ['react'] }).code;
    var factory = new Function('React', 'ReactDOM', out + '\n;return App;');
    var App = factory(window.React, window.ReactDOM);
    window.ReactDOM.createRoot(document.getElementById('root')).render(window.React.createElement(App));
  } catch (e) {
    fail((e && e.stack) || e);
  }
})();
</script>
</body>
</html>
